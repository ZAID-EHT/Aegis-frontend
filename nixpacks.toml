providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = ["python -m pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'No build step for FastAPI backend'"]

[start]
cmd = "python -m uvicorn aegis.api.main:app --host 0.0.0.0 --port $PORT"
