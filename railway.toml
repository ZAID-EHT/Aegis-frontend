[build]
builder = "nixpacks"

[[services]]
name = "aegis-engine"
source = "."
buildCommand = "pip install -r requirements.txt"
startCommand = "uvicorn aegis.api.main:app --host 0.0.0.0 --port $PORT"

[[services]]
name = "aegis-dashboard"
source = "."
buildCommand = "pnpm install && pnpm build"
startCommand = "pnpm start"